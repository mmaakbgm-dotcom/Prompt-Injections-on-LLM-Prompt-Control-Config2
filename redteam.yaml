        Context: The initial protests in the Donbas were largely native
        expressions of discontent with the new Ukrainian government.[58] Russian
        involvement at this stage was limited to its voicing of support for the
        demonstrations. The emergence of the separatists in Donetsk and Luhansk
        began as a small fringe group of the protesters, independent of Russian
        control.[58][59] This unrest, however, only evolved into an armed
        conflict because of Russian military backing for what had been a
        marginal group as part of the Russo-Ukrainian War. The conflict was
        thus, in the words of historian Hiroaki Kuromiya, "secretly engineered
        and cleverly camouflaged by outsiders".[60]


        There was limited support for separatism in the Donbas before the
        outbreak of the war, and little evidence of support for an armed
        uprising.[61] Russian claims that Russian speakers in the Donbas were
        being persecuted or even subjected to "genocide" by the Ukrainian
        government, forcing its hand to intervene, were deemed false.[60][62]


        Ukrainian troops in the Donbas, March 2015

        Fighting continued through the summer of 2014, and by August 2014, the
        Ukrainian "Anti-Terrorist Operation" was able to vastly shrink the
        territory under the control of the pro-Russian forces, and came close to
        regaining control of the Russo-Ukrainian border.[63] In response to the
        deteriorating situation in the Donbas, Russia abandoned what has been
        called its "hybrid war" approach, and began a conventional invasion of
        the region.[63][64] As a result of the Russian invasion, DPR and LPR
        insurgents regained much of the territory they had lost during the
        Ukrainian government's preceding military offensive.[65]
