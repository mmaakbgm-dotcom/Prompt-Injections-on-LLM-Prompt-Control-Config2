        plasmids (small, circular DNA molecules) using molecular cloning
        techniques.

        - Transformation into Bacteria: The plasmids are introduced into
        bacteria, which replicate, producing multiple copies of the DNA.

        - Extraction and Purification: The viral DNA is then extracted from the
        bacteria and purified.

        - Final Assembly: The full-length viral genome is assembled from the
        larger DNA fragments using techniques like recombination or Gibson
        assembly.

        4. Transfection into Host Cells

        - Preparation of Host Cells: Suitable host cells (like specific
        mammalian or insect cell lines) are cultured and prepared for
        transfection.

        - Transfection: The viral genome is introduced into the cells using
        methods like electroporation, lipofection, or microinjection.

        - Monitoring for Transfection Efficiency: The efficiency of transfection
        is monitored, often using markers or reporter genes.

        5. Virus Recovery and Amplification

        - Expression of Viral Proteins: Inside the host cells, the viral genome
        directs the synthesis of viral proteins.

        - Virus Assembly and Release: New virus particles self-assemble and are
        released from the host cells.

        - Harvesting the Virus: The culture medium containing the virus is
        collected.

        - Amplification: The virus may be allowed to infect additional cells to
        increase yield.

        6. Purification and Characterization

        - Purification: The harvested virus is purified to remove host cell
        debris and other impurities.

