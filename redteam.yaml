        Context: Some scanners have a row of photo-sensors which the paper
        ballot passes by, and they record light and dark pixels from the ballot.
        Other scanners work by scanning the ballot to create an electronic image
        (i.e. a picture) of the ballot. Then the resulting image (picture) is
        analyzed by internal software to discern what votes were cast. In these
        types of vote tabulators, any defect in the scanning apparatus, such as
        dirt, scratches on the lens, or chads of paper, may mar the image of the
        ballot. These types of defects may produce long black lines, or white
        lines in the ballot image, which then may be misread by the software as
        an undervote (no votes for anyone), or as an overvote (a vote for every
        candidate).[16][17][18] Some offices blow compressed air over the
        scanners after every 200 ballots to remove dust.[19]


        Software can miscount or fail to count. If it fails or miscounts
        drastically enough, people notice and check. Errors can happen in the
        scanner or at the ballot printer. Staff rarely identify the person who
        caused an error, and assume it was accidental, not a hack.


